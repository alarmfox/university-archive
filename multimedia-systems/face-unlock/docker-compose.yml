version: '3'

volumes:
  access-data:
  pg-data:

services:
  app:
    build: .
    environment:
      - UVICORN_HOST=0.0.0.0
      - DATABASE_URL=postgresql://postgres:postgres@db/postgres
      - CACHE_URL=cache:6379
    ports:
      - 8000:8000
    depends_on:
      - db
    volumes:
      - access-data:/app/access_log

  db:
    image: postgres:alpine
    environment:
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pg-data:/var/lib/postgresql/data

  cache:
    image: redis:alpine